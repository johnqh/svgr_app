            - generic [ref=e62]:
                - heading "将照片转换为SVG" [level=1] [ref=e95]
                - generic [ref=e64]:
                    - paragraph [ref=e65]: 将照片转换为SVG会产生一种风格化、抽象的艺术效果。与徽标或二维码不同，照片包含连续色调和渐变，无法在矢量格式中精确表示。结果是一种艺术性诠释——形状和色彩区域捕捉了照片的精髓，呈现出绘画般或色块化的风格。这非常适合创意项目、墙艺或基于真实照片的风格化插图。
                    - generic [ref=e66]:
                        - heading "如何转换" [level=2] [ref=e67]
                        - list [ref=e68]:
                            - listitem [ref=e69]: 上传您的照片（PNG、JPG 或 WEBP）。
                            - listitem [ref=e70]: 将图像类型设置为照片。此模式针对连续色调图像进行了优化，可产生更平滑的颜色过渡。
                            - listitem [ref=e71]: 禁用识别文本。照片通常不包含需要作为可编辑路径保留的文本。
                            - listitem [ref=e72]: 点击转换并预览结果。输出将具有抽象、艺术的质感。
                            - listitem [ref=e73]: 下载SVG。每次下载消耗1个积分。
                    - generic [ref=e96]:
                        - heading "文件大小警告" [level=3] [ref=e97]
                        - paragraph [ref=e98]: 照片转SVG可能会生成较大的文件，因为照片包含许多颜色区域和渐变。高分辨率的照片可能导致SVG文件达到几兆字节。为了获得更小的文件，请使用较低分辨率的源图像。
                    - generic [ref=e74]:
                        - heading "提示" [level=2] [ref=e75]
                        - list [ref=e76]:
                            - listitem [ref=e77]: 对比强烈、色彩鲜明且构图简单的照片能产生最佳效果。
                            - listitem [ref=e78]: 结果不是逼真的再现——而是一种艺术性的矢量诠释。拥抱抽象的特质。
                            - listitem [ref=e79]: 尝试不同的源照片，看看哪些风格效果最好。人像、风景和静物主题各自会产生不同的结果。
                    - generic [ref=e80]:
                        - heading "准备好了吗？" [level=2] [ref=e81]
                        - paragraph [ref=e82]: 上传您的图片，几秒钟内即可转换为SVG。
                        - button "开始转换" [ref=e83] [cursor=pointer]
