            - generic [ref=e62]:
                - heading "将AI徽标转换为SVG" [level=1] [ref=e95]
                - generic [ref=e64]:
                    - paragraph [ref=e65]: 所有AI徽标生成器——Looka、Brandmark、Hatchful、Logo.com以及其他——输出光栅图像（PNG或JPG）。当将光栅徽标放大用于横幅、商品或印刷时，其质量会下降。它们在高DPI屏幕上看起来模糊，并且无法在Illustrator或Figma等矢量设计工具中干净地编辑。要专业地使用AI生成的徽标，您需要一个可缩放的矢量（SVG）版本。
                    - generic [ref=e66]:
                        - heading "如何转换" [level=2] [ref=e67]
                        - list [ref=e68]:
                            - listitem [ref=e69]: 上传您的AI生成的徽标图像（PNG、JPG或WEBP）。
                            - listitem [ref=e70]: 将图像类型设置为设计。这会告诉SVGR保留标志艺术中常见的硬边和纯色区域。
                            - listitem [ref=e71]: 将质量等级设为5。这可以在不使SVG路径过于复杂的情况下捕捉精细细节。您可以根据logo的复杂程度向上或向下调整。
                            - listitem [ref=e72]: 点击转换并预览结果。
                            - listitem [ref=e73]: 下载SVG。每次下载消耗1个积分。
                    - generic [ref=e74]:
                        - heading "提示" [level=2] [ref=e75]
                        - list [ref=e76]:
                            - listitem [ref=e77]: 使用带有透明或实心背景的徽标图像，以获得最佳效果。
                            - listitem [ref=e78]: 如果结果看起来过于简化，请提高质量等级。如果看起来过于复杂，请降低它。
                            - listitem [ref=e79]: SVG 输出是设计师在 Illustrator 或 Figma 中进行微调的绝佳起点——即使它不是像素级精确的。
                    - generic [ref=e80]:
                        - heading "准备好了吗？" [level=2] [ref=e81]
                        - paragraph [ref=e82]: 上传您的图片，几秒钟内即可转换为SVG。
                        - button "开始转换" [ref=e83] [cursor=pointer]
